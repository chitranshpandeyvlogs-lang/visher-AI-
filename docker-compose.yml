version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server-1:
    build: .
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      QUEUE_CONCURRENCY: 5
      DISABLE_CLUSTERING: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  server-2:
    build: .
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      QUEUE_CONCURRENCY: 5
      DISABLE_CLUSTERING: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  server-3:
    build: .
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      QUEUE_CONCURRENCY: 5
      DISABLE_CLUSTERING: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server-1
      - server-2
      - server-3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
