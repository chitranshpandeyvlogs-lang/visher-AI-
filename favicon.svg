<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Left Wing Gradient: Deep Indigo to Violet to Vibrant Pink -->
    <linearGradient id="leftGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="40%" stop-color="#8b5cf6" />
      <stop offset="80%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Right Wing Gradient: Deep Blue to Vibrant Cyan to Sky Blue -->
    <linearGradient id="rightGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="40%" stop-color="#0284c7" />
      <stop offset="80%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <!-- Central Node Radial Gradient -->
    <radialGradient id="sphereGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#a5f3fc" />
      <stop offset="100%" stop-color="#0284c7" />
    </radialGradient>

    <!-- Soft Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Master Wing Path Definition (Left Wing) -->
    <path id="wingPath" d="M 250,410 C 210,350 140,250 110,140 C 130,170 185,220 205,220 C 220,220 220,200 200,190 C 185,182 195,170 215,170 C 230,170 235,185 235,210 C 235,260 245,340 250,410 Z" />
  </defs>

  <!-- Background (Optional, but gives rich contrast) -->
  <rect width="100%" height="100%" fill="#030206" rx="100" />

  <!-- Symmetrical Wings -->
  <g filter="url(#neonGlow)">
    <!-- Left Wing (Indigo-Pink) -->
    <use href="#wingPath" fill="url(#leftGrad)" />

    <!-- Right Wing (Mirrored, Blue-Cyan) -->
    <use href="#wingPath" fill="url(#rightGrad)" transform="translate(500, 0) scale(-1, 1)" />
  </g>

  <!-- Neural Circuitry Trunk & Nodes -->
  <g filter="url(#neonGlow)">
    <!-- Central Vertical Trunk -->
    <line x1="250" y1="310" x2="250" y2="180" stroke="#22d3ee" stroke-width="4.5" stroke-linecap="round" />

    <!-- Left Side Branches (Mirrored to Right automatically inside symmetrical <g>) -->
    <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Symmetrical group for left and right branches -->
      <!-- Left Branches -->
      <path d="M 250,290 L 225,265 L 225,240 C 225,225 210,225 200,215" />
      <path d="M 250,265 L 235,250 L 235,215 C 235,200 220,200 210,190" />
      <path d="M 250,240 L 242,232 L 242,190 C 242,178 232,178 222,170" />

      <!-- Right Branches (Mirrored) -->
      <path d="M 250,290 L 275,265 L 275,240 C 275,225 290,225 300,215" />
      <path d="M 250,265 L 265,250 L 265,215 C 265,200 280,200 290,190" />
      <path d="M 250,240 L 258,232 L 258,190 C 258,178 268,178 278,170" />
    </g>

    <!-- Circuitry Node Dots -->
    <!-- Left side dots -->
    <circle cx="196" cy="211" r="5" fill="#a78bfa" />
    <circle cx="206" cy="186" r="5" fill="#a78bfa" />
    <circle cx="218" cy="166" r="5" fill="#a78bfa" />

    <!-- Right side dots -->
    <circle cx="304" cy="211" r="5" fill="#22d3ee" />
    <circle cx="294" cy="186" r="5" fill="#22d3ee" />
    <circle cx="282" cy="166" r="5" fill="#22d3ee" />

    <!-- Central Majestic Sphere at the very top of trunk -->
    <circle cx="250" cy="155" r="15" fill="url(#sphereGrad)" stroke="#ffffff" stroke-width="1.5" />
  </g>
</svg>